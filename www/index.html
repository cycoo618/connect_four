<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONNECT FOUR · 四子棋</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="四子棋">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#06060f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #06060f;
      --board:       #0d2580;
      --board-hi:    #1537b8;
      --board-lo:    #07175a;
      --hole:        #04080f;
      --red:         #ff2d55;
      --red-glow:    rgba(255,45,85,.65);
      --yel:         #ffd60a;
      --yel-glow:    rgba(255,214,10,.65);
      --cyan:        #4cc9ff;
      --text:        #dde8ff;
      --dim:         rgba(221,232,255,.35);
      --gap:         8px;
      --cell:        clamp(36px, calc((100vw - 104px) / 7), 88px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    #halo {
      position: fixed; top: 50%; left: 50%;
      translate: -50% -50%;
      width: 900px; height: 600px;
      background: radial-gradient(ellipse, rgba(13,37,128,.35) 0%, transparent 70%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Bungee', cursive;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(76,201,255,.9), 0 0 60px rgba(76,201,255,.3);
      margin-bottom: 2px;
    }

    #sub {
      font-size: .65rem;
      letter-spacing: 5px;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── Mode & Difficulty toggle bars ── */
    .toggle-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .toggle-btn {
      padding: 5px 16px;
      border-radius: 20px;
      font-family: '圆体-简', 'STRoundedMedium', 'YouYuan', '幼圆', 'Noto Sans SC', 'DM Mono', monospace;
      font-size: .62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(221,232,255,.2);
      background: transparent;
      color: var(--dim);
      transition: all .2s;
    }
    .toggle-btn:hover:not(.active) {
      border-color: rgba(221,232,255,.4);
      color: var(--text);
    }
    .toggle-btn.active {
      border-color: rgba(76,201,255,.6);
      color: var(--cyan);
      background: rgba(76,201,255,.12);
    }

    #diff-bar { display: none; margin-bottom: 8px; }
    #diff-bar.show { display: flex; }

    .diff-btn.active[data-diff="easy"]   { border-color: rgba(80,200,100,.7); color: #50c864; background: rgba(80,200,100,.1); }
    .diff-btn.active[data-diff="medium"] { border-color: rgba(255,165,0,.7);  color: #ffa500; background: rgba(255,165,0,.1); }
    .diff-btn.active[data-diff="hard"]   { border-color: rgba(255,45,85,.7);  color: var(--red); background: rgba(255,45,85,.1); }

    /* ── Turn bar ── */
    #turn-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 18px;
      height: 28px;
    }

    .pip {
      width: 18px; height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: box-shadow .3s, opacity .3s;
    }
    .pip.red { background: var(--red); box-shadow: 0 0 10px var(--red-glow); }
    .pip.yel { background: var(--yel); box-shadow: 0 0 10px var(--yel-glow); }
    .pip.inactive { opacity: .25; box-shadow: none; }

    /* ── Board ── */
    #wrap { position: relative; }

    #arrows {
      display: grid;
      grid-template-columns: repeat(7, var(--cell));
      gap: var(--gap);
      padding: 0 12px;
      margin-bottom: 6px;
    }

    .arrow-btn {
      background: transparent; border: none; cursor: pointer;
      height: 26px; display: flex; align-items: center; justify-content: center;
      border-radius: 4px; transition: background .15s;
    }
    .arrow-btn::before {
      content: '▼'; font-size: 13px;
      color: rgba(76,201,255,.35);
      transition: color .2s, transform .2s;
    }
    .arrow-btn:not(:disabled):hover::before { color: rgba(76,201,255,.9); transform: translateY(3px); }
    .arrow-btn.hover-red::before { color: rgba(255,45,85,.9) !important; }
    .arrow-btn.hover-yel::before { color: rgba(255,214,10,.9) !important; }
    .arrow-btn:disabled::before  { color: rgba(76,201,255,.1) !important; }
    .arrow-btn:disabled { cursor: default; }

    .cell { cursor: pointer; }
    .cell:hover { filter: brightness(1.15); }

    #board {
      background: linear-gradient(145deg, var(--board-hi), var(--board) 50%, var(--board-lo));
      border-radius: 16px; padding: 12px;
      display: grid;
      grid-template-columns: repeat(7, var(--cell));
      grid-template-rows: repeat(6, var(--cell));
      gap: var(--gap);
      box-shadow:
        0 24px 64px rgba(0,0,0,.85),
        0 0 0 1.5px rgba(76,201,255,.12),
        inset 0 1px 0 rgba(255,255,255,.1);
      overflow: hidden;
    }

    .cell {
      width: var(--cell); height: var(--cell);
      border-radius: 50%;
      background: var(--hole);
      box-shadow: inset 0 4px 14px rgba(0,0,0,.9), inset 0 1px 4px rgba(0,0,0,.6);
      position: relative;
    }

    .piece {
      position: absolute; inset: 0; border-radius: 50%;
      animation-name: fall;
      animation-timing-function: cubic-bezier(.33,1,.68,1);
      animation-fill-mode: forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(var(--start-y, -400px)); }
      72%  { transform: translateY(5px); }
      86%  { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }

    .piece.red {
      background: radial-gradient(circle at 36% 34%, #ff7090, var(--red) 52%, #8b0a25);
      box-shadow: 0 0 18px var(--red-glow), inset 0 2px 5px rgba(255,255,255,.28);
    }
    .piece.yel {
      background: radial-gradient(circle at 36% 34%, #ffe870, var(--yel) 52%, #8b6a00);
      box-shadow: 0 0 18px var(--yel-glow), inset 0 2px 5px rgba(255,255,255,.35);
    }
    .piece.winner { animation: winner-pulse .55s ease-in-out infinite alternate; }
    @keyframes winner-pulse {
      from { filter: brightness(1) saturate(1); transform: scale(1); }
      to   { filter: brightness(1.55) saturate(1.3); transform: scale(1.08); }
    }

    /* AI thinking indicator */
    #thinking {
      display: none;
      font-size: .65rem;
      letter-spacing: 3px;
      color: var(--yel);
      text-transform: uppercase;
      margin-bottom: 6px;
      height: 1.2em;
    }
    #thinking.show { display: block; }
    #thinking::after {
      content: '';
      display: inline-block;
      animation: dots 1s steps(4, end) infinite;
    }
    @keyframes dots {
      0%  { content: ''; }   25% { content: '.'; }
      50% { content: '..'; } 75% { content: '...'; }
    }

    /* ── Scores ── */
    #scores {
      display: flex; align-items: center;
      gap: 36px; margin-top: 26px;
    }
    .sc { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sc-num { font-family: 'Bungee', cursive; font-size: 2.2rem; line-height: 1; }
    .sc-num.red { color: var(--red); text-shadow: 0 0 18px var(--red-glow); }
    .sc-num.yel { color: var(--yel); text-shadow: 0 0 18px var(--yel-glow); }
    .sc-label { font-size: .6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); }
    .sc-sep { font-size: .6rem; letter-spacing: 2px; color: rgba(221,232,255,.15); text-transform: uppercase; }

    /* ── Status ── */
    #status {
      margin-bottom: 8px; font-size: .72rem; letter-spacing: 3px;
      text-transform: uppercase; height: 1.4em; text-align: center;
      transition: color .3s; color: var(--dim);
    }
    #status.s-red  { color: var(--red);  text-shadow: 0 0 12px var(--red-glow); }
    #status.s-yel  { color: var(--yel);  text-shadow: 0 0 12px var(--yel-glow); }
    #status.s-draw { color: var(--cyan); }

    /* ── Controls ── */
    #controls { display: flex; gap: 10px; margin-top: 20px; }

    .btn {
      padding: 9px 22px; border-radius: 6px;
      font-family: 'DM Mono', monospace; font-size: .7rem;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; border: 1px solid; background: transparent;
      transition: background .2s, box-shadow .2s;
    }
    .btn-restart { border-color: rgba(76,201,255,.45); color: var(--cyan); }
    .btn-restart:hover { background: rgba(76,201,255,.1); box-shadow: 0 0 14px rgba(76,201,255,.2); }
    .btn-undo { border-color: rgba(221,232,255,.2); color: rgba(221,232,255,.45); }
    .btn-undo:not(:disabled):hover { border-color: rgba(221,232,255,.4); color: var(--text); }
    .btn-undo:disabled { opacity: .3; cursor: default; }

    /* ── Sidebar (transparent on mobile) ── */
    #sidebar { display: contents; }

    /* ── iPad native app three-column layout (sidebar | board | mirror) ── */
    @media (min-width: 744px) {
      body.is-native {
        --cell: clamp(36px, min(
          calc((100vw - 396px) / 7),
          calc((100vh - 104px) / 6)
        ), 130px);
        display: grid;
        grid-template-columns: 130px auto 130px;
        align-items: center;
        justify-items: center;
        padding: 16px;
        gap: 16px;
      }
      body.is-native #sidebar {
        grid-column: 1;
        justify-self: stretch;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      body.is-native #wrap { grid-column: 2; }
      body.is-native #sidebar h1          { font-size: 1rem; letter-spacing: 1px; margin-bottom: 0; white-space: normal; text-align: center; }
      body.is-native #sidebar #sub        { margin-bottom: 4px; }
      body.is-native #sidebar #turn-bar   { margin-bottom: 0; }
      body.is-native #sidebar #scores     { margin-top: 4px; }
      body.is-native #sidebar #controls   { margin-top: 4px; }
      body.is-native #sidebar .toggle-bar { flex-direction: column; width: 100%; }
      body.is-native #sidebar .toggle-btn { width: 100%; text-align: center; }
    }

  </style>
</head>
<body>
<div id="halo"></div>

<div id="sidebar">
<h1>CONNECT FOUR</h1>
<p id="sub">四子棋</p>

<!-- Mode selector -->
<div class="toggle-bar" id="mode-bar">
  <button class="toggle-btn active" id="mode-pvp">👥 双人对战</button>
  <button class="toggle-btn"        id="mode-ai" >🤖 人机对战</button>
</div>

<!-- Difficulty selector (AI mode only) -->
<div class="toggle-bar" id="diff-bar">
  <button class="toggle-btn diff-btn" data-diff="easy">简单</button>
  <button class="toggle-btn diff-btn active" data-diff="medium">中等</button>
  <button class="toggle-btn diff-btn" data-diff="hard">困难</button>
</div>

<div id="turn-bar">
  <div class="pip red" id="pip-red"></div>
  <span id="label-red">红方</span>
  <span style="color:rgba(221,232,255,.2);margin:0 4px">·</span>
  <span id="label-yel">黄方</span>
  <div class="pip yel inactive" id="pip-yel"></div>
</div>

<div id="thinking">AI 思考中</div>
<div id="status">红方先手</div>

<div id="scores">
  <div class="sc">
    <span class="sc-num red" id="sc-red">0</span>
    <span class="sc-label" id="sc-label-red">红方</span>
  </div>
  <div class="sc-sep">胜场</div>
  <div class="sc">
    <span class="sc-num yel" id="sc-yel">0</span>
    <span class="sc-label" id="sc-label-yel">黄方</span>
  </div>
</div>

<div id="controls">
  <button class="btn btn-undo" id="btn-undo" disabled>↩ 撤销</button>
  <button class="btn btn-restart" id="btn-restart">↺ 重开</button>
</div>
</div>

<div id="wrap">
  <div id="arrows"></div>
  <div id="board"></div>
</div>

<script>
/* ════════════════════════════════════════
   Constants & State
════════════════════════════════════════ */
const ROWS = 6, COLS = 7;
const CELL = 62 + 8;
const COL_ORDER = [3,2,4,1,5,0,6]; // center-first for AI

let board, cur, hist, over, aiThinking, dropping;
let scores = { red: 0, yel: 0 };
let aiMode = false;
let difficulty = 'medium';

/* ════════════════════════════════════════
   DOM refs
════════════════════════════════════════ */
const boardEl      = document.getElementById('board');
const arrowsEl     = document.getElementById('arrows');
const statusEl     = document.getElementById('status');
const undoBtn      = document.getElementById('btn-undo');
const scRed        = document.getElementById('sc-red');
const scYel        = document.getElementById('sc-yel');
const scLabelRed   = document.getElementById('sc-label-red');
const scLabelYel   = document.getElementById('sc-label-yel');
const pipRed       = document.getElementById('pip-red');
const pipYel       = document.getElementById('pip-yel');
const labelRed     = document.getElementById('label-red');
const labelYel     = document.getElementById('label-yel');
const thinkingEl   = document.getElementById('thinking');
const diffBar      = document.getElementById('diff-bar');

/* ════════════════════════════════════════
   Game Init
════════════════════════════════════════ */
function init() {
  board      = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  cur        = 'red';
  hist       = [];
  over       = false;
  aiThinking = false;
  dropping   = false;
  thinkingEl.classList.remove('show');
  buildDOM();
  reflect();
}

function buildDOM() {
  boardEl.innerHTML = '';
  arrowsEl.innerHTML = '';

  for (let c = 0; c < COLS; c++) {
    const btn = document.createElement('button');
    btn.className = 'arrow-btn';
    btn.addEventListener('click', () => humanDrop(c));
    btn.addEventListener('mouseenter', () => {
      if (!over && !aiThinking) btn.classList.add(cur === 'red' ? 'hover-red' : 'hover-yel');
    });
    btn.addEventListener('mouseleave', () => btn.classList.remove('hover-red', 'hover-yel'));
    arrowsEl.appendChild(btn);
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.dataset.r = r; el.dataset.c = c;
      el.addEventListener('click', () => humanDrop(c));
      boardEl.appendChild(el);
    }
  }
}

/* ════════════════════════════════════════
   Human vs AI routing
════════════════════════════════════════ */
function humanDrop(col) {
  if (aiThinking) return;                       // block input while AI thinks
  if (aiMode && cur === 'yel') return;          // not human's turn
  drop(col);
}

/* ════════════════════════════════════════
   Core Drop
════════════════════════════════════════ */
function drop(col) {
  if (over || dropping) return;
  const row = dropRow(col);
  if (row === -1) return;
  dropping = true;

  board[row][col] = cur;
  hist.push({ row, col, player: cur });

  const piece = document.createElement('div');
  piece.className = `piece ${cur}`;
  const startY = -((row + 1) * CELL + 60);
  const dur    = Math.min(0.18 + row * 0.055, 0.52);
  piece.style.setProperty('--start-y', `${startY}px`);
  piece.style.animationDuration = `${dur}s`;
  cellEl(row, col).appendChild(piece);

  if (row === 0) arrowsEl.children[col].disabled = true;
  undoBtn.disabled = false;
  Array.from(arrowsEl.children).forEach(b => b.classList.remove('hover-red', 'hover-yel'));

  setTimeout(() => {
    dropping = false;
    const win = checkWin(row, col, cur);
    if (win) {
      win.forEach(([r, c]) => {
        const p = cellEl(r, c).querySelector('.piece');
        if (p) p.classList.add('winner');
      });
      scores[cur]++;
      scRed.textContent = scores.red;
      scYel.textContent = scores.yel;
      setStatus(cur === 'red' ? 's-red' : 's-yel',
        cur === 'red' ? (aiMode ? '你赢了！' : '红方获胜！')
                      : (aiMode ? 'AI 获胜！' : '黄方获胜！'));
      over = true;
      setArrows(true);
      undoBtn.disabled = true;
      thinkingEl.classList.remove('show');
      return;
    }
    if (hist.length === ROWS * COLS) {
      setStatus('s-draw', '平局！');
      over = true; setArrows(true);
      undoBtn.disabled = true;
      thinkingEl.classList.remove('show');
      return;
    }

    cur = cur === 'red' ? 'yel' : 'red';
    reflect();

    if (aiMode && cur === 'yel') scheduleAI();

  }, dur * 1000 + 40);
}

/* ════════════════════════════════════════
   AI Scheduling
════════════════════════════════════════ */
function scheduleAI() {
  aiThinking = true;
  setArrows(true);
  thinkingEl.classList.add('show');
  setStatus('', 'AI 思考中');

  // Small delay so UI updates before heavy computation
  setTimeout(() => {
    const col = getAICol();
    aiThinking = false;
    thinkingEl.classList.remove('show');
    setArrows(false);
    // Re-disable full columns
    for (let c = 0; c < COLS; c++) {
      if (board[0][c] !== null) arrowsEl.children[c].disabled = true;
    }
    drop(col);
  }, difficulty === 'hard' ? 300 : 200);
}

function getAICol() {
  if (difficulty === 'easy')   return easyAI();
  if (difficulty === 'medium') return mediumAI();
  return hardAI();
}

/* ════════════════════════════════════════
   Easy AI — random
════════════════════════════════════════ */
function easyAI() {
  const cols = validCols();
  return cols[Math.floor(Math.random() * cols.length)];
}

/* ════════════════════════════════════════
   Medium AI — win/block + center bias
════════════════════════════════════════ */
function mediumAI() {
  const cols = validCols();

  // Win if possible
  for (const c of cols) {
    const r = dropRow(c);
    board[r][c] = 'yel';
    const w = hasWon(r, c, 'yel');
    board[r][c] = null;
    if (w) return c;
  }
  // Block human win
  for (const c of cols) {
    const r = dropRow(c);
    board[r][c] = 'red';
    const w = hasWon(r, c, 'red');
    board[r][c] = null;
    if (w) return c;
  }
  // Center-biased pick with some randomness
  const centered = COL_ORDER.filter(c => cols.includes(c));
  return Math.random() < 0.65 ? centered[0] : cols[Math.floor(Math.random() * cols.length)];
}

/* ════════════════════════════════════════
   Hard AI — Minimax + Alpha-Beta (depth 7)
════════════════════════════════════════ */
function hardAI() {
  const cols = validCols();
  const ordered = COL_ORDER.filter(c => cols.includes(c));
  let bestScore = -Infinity, bestCol = ordered[0];

  for (const c of ordered) {
    const r = dropRow(c);
    board[r][c] = 'yel';
    if (hasWon(r, c, 'yel')) { board[r][c] = null; return c; } // immediate win
    const score = minimax(6, -Infinity, Infinity, false);
    board[r][c] = null;
    if (score > bestScore) { bestScore = score; bestCol = c; }
  }
  return bestCol;
}

function minimax(depth, alpha, beta, isMax) {
  const cols = validCols();
  if (cols.length === 0) return 0;
  if (depth === 0) return evaluate();

  const ordered = COL_ORDER.filter(c => cols.includes(c));

  if (isMax) {
    let best = -Infinity;
    for (const c of ordered) {
      const r = dropRow(c);
      board[r][c] = 'yel';
      const score = hasWon(r, c, 'yel')
        ? 100000 + depth
        : minimax(depth - 1, alpha, beta, false);
      board[r][c] = null;
      best = Math.max(best, score);
      alpha = Math.max(alpha, score);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const c of ordered) {
      const r = dropRow(c);
      board[r][c] = 'red';
      const score = hasWon(r, c, 'red')
        ? -100000 - depth
        : minimax(depth - 1, alpha, beta, true);
      board[r][c] = null;
      best = Math.min(best, score);
      beta = Math.min(beta, score);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function evaluate() {
  let score = 0;
  // Center column preference
  for (let r = 0; r < ROWS; r++) {
    if (board[r][3] === 'yel') score += 3;
    else if (board[r][3] === 'red') score -= 3;
  }
  // Score all windows of 4
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      for (const [dr, dc] of dirs) {
        const w = [];
        for (let i = 0; i < 4; i++) {
          const nr = r + dr*i, nc = c + dc*i;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) w.push(board[nr][nc]);
        }
        if (w.length === 4) score += scoreWindow(w);
      }
    }
  }
  return score;
}

function scoreWindow(w) {
  const yel   = w.filter(x => x === 'yel').length;
  const red   = w.filter(x => x === 'red').length;
  const empty = w.filter(x => x === null).length;
  if (yel === 4) return 100;
  if (yel === 3 && empty === 1) return 5;
  if (yel === 2 && empty === 2) return 2;
  if (red === 3 && empty === 1) return -4;
  if (red === 4) return -100;
  return 0;
}

/* ════════════════════════════════════════
   Board Helpers
════════════════════════════════════════ */
function dropRow(col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (!board[r][col]) return r;
  }
  return -1;
}

function validCols() {
  return Array.from({ length: COLS }, (_, c) => c).filter(c => board[0][c] === null);
}

function hasWon(row, col, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let n = 1;
    for (const s of [-1, 1]) {
      let r = row + dr*s, c = col + dc*s;
      while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
        n++; r += dr*s; c += dc*s;
      }
    }
    if (n >= 4) return true;
  }
  return false;
}

// Returns winning line coords (for highlighting) or null
function checkWin(row, col, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    const line = [[row, col]];
    for (const s of [-1, 1]) {
      let r = row + dr*s, c = col + dc*s;
      while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
        line.push([r, c]); r += dr*s; c += dc*s;
      }
    }
    if (line.length >= 4) return line;
  }
  return null;
}

function cellEl(r, c) {
  return boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

/* ════════════════════════════════════════
   Undo
════════════════════════════════════════ */
function undo() {
  if (over || !hist.length || aiThinking) return;

  // In AI mode, undo 2 moves (AI + human), unless only 1 move exists
  const undoCount = (aiMode && hist.length >= 2) ? 2 : 1;

  for (let i = 0; i < undoCount; i++) {
    if (!hist.length) break;
    const { row, col, player } = hist.pop();
    board[row][col] = null;
    const p = cellEl(row, col).querySelector('.piece');
    if (p) p.remove();
    arrowsEl.children[col].disabled = false;
    cur = player;
  }

  undoBtn.disabled = hist.length === 0;
  reflect();
}

/* ════════════════════════════════════════
   UI Helpers
════════════════════════════════════════ */
function setArrows(disabled) {
  Array.from(arrowsEl.children).forEach(b => b.disabled = disabled);
}

function setStatus(cls, msg) {
  statusEl.className = cls;
  statusEl.textContent = msg;
}

function reflect() {
  pipRed.classList.toggle('inactive', cur !== 'red');
  pipYel.classList.toggle('inactive', cur !== 'yel');

  if (!aiThinking) {
    const redTurn = cur === 'red';
    setStatus('', redTurn
      ? (aiMode ? '你的回合' : '红方落子')
      : (aiMode ? 'AI 的回合' : '黄方落子'));
  }
}

function updateModeLabels() {
  if (aiMode) {
    labelRed.textContent    = '你';
    labelYel.textContent    = 'AI';
    scLabelRed.textContent  = '你';
    scLabelYel.textContent  = 'AI';
  } else {
    labelRed.textContent    = '红方';
    labelYel.textContent    = '黄方';
    scLabelRed.textContent  = '红方';
    scLabelYel.textContent  = '黄方';
  }
}

/* ════════════════════════════════════════
   Event Listeners
════════════════════════════════════════ */
document.getElementById('btn-restart').addEventListener('click', init);
undoBtn.addEventListener('click', undo);

document.getElementById('mode-pvp').addEventListener('click', () => {
  if (!aiMode) return;
  aiMode = false;
  document.getElementById('mode-pvp').classList.add('active');
  document.getElementById('mode-ai').classList.remove('active');
  diffBar.classList.remove('show');
  scores = { red: 0, yel: 0 };
  scRed.textContent = 0; scYel.textContent = 0;
  updateModeLabels();
  init();
});

document.getElementById('mode-ai').addEventListener('click', () => {
  if (aiMode) return;
  aiMode = true;
  document.getElementById('mode-ai').classList.add('active');
  document.getElementById('mode-pvp').classList.remove('active');
  diffBar.classList.add('show');
  scores = { red: 0, yel: 0 };
  scRed.textContent = 0; scYel.textContent = 0;
  updateModeLabels();
  init();
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    scores = { red: 0, yel: 0 };
    scRed.textContent = 0; scYel.textContent = 0;
    init();
  });
});

// Mark native Capacitor app to enable iPad layout
if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
  document.body.classList.add('is-native');
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
